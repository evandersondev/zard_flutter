name: zard_flutter
description: Reactive, headless-first forms for Flutter powered by zard schemas. React-Hook-Form-style ergonomics, granular rebuilds, nested paths, field arrays, and async validation.
version: 1.0.0-beta.1
repository: https://github.com/evandersondev/zard_flutter
homepage: https://github.com/evandersondev/zard_flutter

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  zard: ^1.1.2

  # Optional. Only `lib/hooks.dart` imports flutter_hooks; if you don't
  # use the hooks layer you can omit this dependency in your downstream
  # pubspec by replacing the package with `dependency_overrides` removal.
  flutter_hooks: ^0.20.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/logo.png
